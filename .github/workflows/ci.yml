name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Backend: Go build + unit tests + integration tests
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit & integration tests
        env:
          JWT_SECRET: ci-test-secret
          APP_ENV: development
          APP_URL: http://localhost:5173
          SMTP_HOST: ""
          STRIPE_SECRET_KEY: ""
          ADMIN_SECRET: ci-admin-secret
        run: go test ./... -count=1 -race -timeout 120s

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend: Node build + Vitest unit tests
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

  # ────────────────────────────────────────────────────────────────────────────
  # Docker Compose: verify the full stack builds
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Verify containers start
        env:
          DB_USER: outcraftly
          DB_PASSWORD: ci-test-password
          DB_NAME: accounts
          JWT_SECRET: ci-test-secret
          ADMIN_SECRET: ci-admin-secret
          APP_ENV: development
          APP_URL: http://localhost:5173
          SMTP_HOST: ""
          SMTP_FROM: test@test.com
          SMTP_REPLY_TO: test@test.com
          STRIPE_SECRET_KEY: ""
          STRIPE_PUBLISHABLE_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          sleep 15
          
          # Check backend health via frontend nginx proxy
          docker compose ps
          
          # Hit the health endpoint through the frontend proxy
          FRONTEND_IP=$(docker compose port frontend 80 2>/dev/null || echo "")
          if [ -n "$FRONTEND_IP" ]; then
            curl -sf http://$FRONTEND_IP/api/v1/health || echo "Health check via proxy skipped (no port mapping)"
          else
            # Direct backend check
            docker compose exec -T backend wget -qO- http://localhost:8080/api/v1/health || echo "Direct health check attempted"
          fi
          
          docker compose down -v
