services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-gour}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gour}
      POSTGRES_DB:       ${DB_NAME:-accounts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gour} -d ${DB_NAME:-accounts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App: single Go binary serves API + Vue SPA on port 3000 ──────────────────
  # No nginx.  Fiber serves static files from ./dist and falls back to
  # index.html for Vue Router client-side routes.  Coolify's Traefik
  # handles TLS termination and reverse-proxying to port 3000.
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # PORT is hardcoded to 3000 — it MUST match the traefik label below
      # and Coolify's ports_exposes.  Do NOT override via Coolify env vars.
      PORT:                   "3000"

      # ── Postgres ──────────────────────────────────────────────────
      DB_HOST:                ${DB_HOST:-db}
      DB_PORT:                ${DB_PORT:-5432}
      DB_USER:                ${DB_USER:-gour}
      DB_PASSWORD:            ${DB_PASSWORD:-gour}
      DB_NAME:                ${DB_NAME:-accounts}

      # ── Auth & JWT ────────────────────────────────────────────────
      APP_ENV:                ${APP_ENV:-production}
      JWT_SECRET:             ${JWT_SECRET:-gour-jwt-production-secret-change-me}
      JWT_ISSUER:             ${JWT_ISSUER:-accounts.gour.io}
      JWT_AUDIENCE:           ${JWT_AUDIENCE:-accounts.gour.io}
      JWT_PRIVATE_KEY:        ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY:         ${JWT_PUBLIC_KEY:-}
      JWKS_URL:               ${JWKS_URL:-}
      ACCOUNTS_BASE_URL:      ${ACCOUNTS_BASE_URL:-https://accounts.gour.io}
      APP_URL:                ${APP_URL:-https://accounts.gour.io}

      # CORS: only the accounts frontend needed as a static origin.
      # Product origins are resolved automatically from the DB.
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-https://accounts.gour.io}
      ALLOW_ORIGINS:          ${ALLOW_ORIGINS:-https://accounts.gour.io}
      AUTH_REDIRECT_URIS:     ${AUTH_REDIRECT_URIS:-}
      ALLOWED_REDIRECT_ORIGINS: ${ALLOWED_REDIRECT_ORIGINS:-}

      # ── Admin panel ───────────────────────────────────────────────
      ADMIN_SECRET:           ${ADMIN_SECRET:-gour-admin-secret-change-me}
      ADMIN_EMAIL:            ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-}

      # ── Email (SMTP — ZeptoMail) ─────────────────────────────────
      SMTP_HOST:              ${SMTP_HOST:-smtp.zeptomail.in}
      SMTP_PORT:              ${SMTP_PORT:-587}
      SMTP_USER:              ${SMTP_USER:-emailapikey}
      SMTP_PASS:              ${SMTP_PASS:-}
      SMTP_FROM:              ${SMTP_FROM:-info@gridworkit.online}
      SMTP_REPLY_TO:          ${SMTP_REPLY_TO:-happy.haplu@gmail.com}

      # ── Stripe (billing) ─────────────────────────────────────────
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}

    labels:
      - traefik.enable=true
      - traefik.http.services.app.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
