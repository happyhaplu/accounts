services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     gour
      POSTGRES_PASSWORD: gour
      POSTGRES_DB:       accounts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gour -d accounts"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App: single Go binary serves API + Vue SPA on port 3000 ──────────────────
  # No nginx.  Fiber serves static files from ./dist and falls back to
  # index.html for Vue Router client-side routes.  Coolify's Traefik
  # handles TLS termination and reverse-proxying to port 3000.
  app:
    build:
      context: .
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-local}
        CACHEBUST: ${SOURCE_COMMIT:-nocache}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Server ────────────────────────────────────────────────────
      PORT:                    "3000"
      APP_ENV:                 "production"

      # ── Postgres ──────────────────────────────────────────────────
      DB_HOST:                 "db"
      DB_PORT:                 "5432"
      DB_USER:                 "gour"
      DB_PASSWORD:             "gour"
      DB_NAME:                 "accounts"

      # ── Auth & JWT ────────────────────────────────────────────────
      JWT_SECRET:              "3d6262178edc142a0fc204443b4531f6dc94276bd6ea46d666befc507e35f560866cba4757a268f0bd2f2bec484e831d"
      JWT_ISSUER:              "accounts.gour.io"
      JWT_AUDIENCE:            "accounts.gour.io"
      ACCOUNTS_BASE_URL:       "https://accounts.gour.io"
      APP_URL:                 "https://accounts.gour.io"

      # ── CORS ──────────────────────────────────────────────────────
      # Only the accounts frontend needed here as a static origin.
      # Product origins are loaded automatically
      # from the product registry in the database at runtime.
      CORS_ALLOWED_ORIGINS:    "https://accounts.gour.io"
      ALLOW_ORIGINS:           "https://accounts.gour.io"

      # ── Admin panel ───────────────────────────────────────────────
      ADMIN_SECRET:            "4ceaf918bb3598936c7093e5215627df352ab85ae9babad95ff5d4caaf893040"
      ADMIN_EMAIL:             "happy.outcraftly@zohomail.in"
      ADMIN_PASSWORD:          "System@123321"

      # ── Email (ZeptoMail SMTP relay) ──────────────────────────────
      SMTP_HOST:               "smtp.zeptomail.in"
      SMTP_PORT:               "587"
      SMTP_USER:               "emailapikey"
      SMTP_PASS:               "PHtE6r0IFunoj2EqoxAG4fTsFc6mY4koqb41KQMSuY1CDv4GSU0BrdgsxDG1+kovVqMTFKOemY5rtL+Uu+jWdD6+NGlEVGqyqK3sx/VYSPOZsbq6x00ctVsYfkTaU4PtdNZq0yXXu9jbNA=="
      SMTP_FROM:               "info@gridworkit.online"
      SMTP_REPLY_TO:           "happy.haplu@gmail.com"

      # ── Stripe (billing) ─────────────────────────────────────────
      STRIPE_SECRET_KEY:       "sk_test_51FmsSaHKFrC8ZGXqMf1s3vr7VVdAJ3xjic1Y3gvNwj8FAvHVbhWIXYTv8Ub7RBONfU54L1ooibwXMZPgMR3cJsUv00k8coD1fK"
      STRIPE_PUBLISHABLE_KEY:  "pk_test_t4mp0WXS94q9ZBcAiHYJLqqJ00B2DYsxGS"
      STRIPE_WEBHOOK_SECRET:   "whsec_56d183eaf40acfbf82efbacfae56335b3ba9258da89c7366a1cd13fe7109187e"

    labels:
      - traefik.enable=true
      - traefik.http.services.app.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
