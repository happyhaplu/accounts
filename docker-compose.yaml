services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-outcraftly}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-outcraftly}
      POSTGRES_DB:       ${DB_NAME:-accounts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-outcraftly} -d ${DB_NAME:-accounts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go API backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:                   ${PORT:-8080}
      DB_HOST:                db               # service name above
      DB_PORT:                5432
      DB_USER:                ${DB_USER:-outcraftly}
      DB_PASSWORD:            ${DB_PASSWORD:-outcraftly}
      DB_NAME:                ${DB_NAME:-accounts}

      # ── Auth & JWT ────────────────────────────────────────────────
      APP_ENV:                ${APP_ENV:-development}
      JWT_SECRET:             ${JWT_SECRET}
      JWT_ISSUER:             ${JWT_ISSUER:-accounts.outcraftly.com}
      JWT_AUDIENCE:           ${JWT_AUDIENCE:-reach}
      JWT_PRIVATE_KEY:        ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY:         ${JWT_PUBLIC_KEY:-}
      JWKS_URL:               ${JWKS_URL:-}
      ACCOUNTS_BASE_URL:      ${ACCOUNTS_BASE_URL:-https://accounts.outcraftly.com}
      APP_URL:                ${APP_URL:-https://accounts.outcraftly.com}

      # ── CORS & Redirect allowlists ────────────────────────────────
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-}
      ALLOW_ORIGINS:          ${ALLOW_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:4000}
      AUTH_REDIRECT_URIS:     ${AUTH_REDIRECT_URIS:-http://localhost:4000/auth/callback,http://localhost:3000/callback}
      ALLOWED_REDIRECT_ORIGINS: ${ALLOWED_REDIRECT_ORIGINS:-}

      # ── Admin ─────────────────────────────────────────────────────
      ADMIN_SECRET:           ${ADMIN_SECRET}

      # ── Email (SMTP) ─────────────────────────────────────────────
      SMTP_HOST:              ${SMTP_HOST}
      SMTP_PORT:              ${SMTP_PORT:-587}
      SMTP_USER:              ${SMTP_USER}
      SMTP_PASS:              ${SMTP_PASS}
      SMTP_FROM:              ${SMTP_FROM}
      SMTP_REPLY_TO:          ${SMTP_REPLY_TO}

      # ── Stripe (billing) ─────────────────────────────────────────
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET}
      STRIPE_EMAIL_WARMUP_PRICE_ID: ${STRIPE_EMAIL_WARMUP_PRICE_ID:-}
      STRIPE_REACH_PRICE_ID:  ${STRIPE_REACH_PRICE_ID:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # No external port — backend is only reachable internally via Docker network.
    # nginx (frontend) proxies /api/ → http://backend:8080 without exposing 8080.
    expose:
      - "8080"

  # ── Vue frontend (nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # No host port mapping — Coolify's Traefik reverse proxy routes external
    # traffic to this container automatically based on the domain you set in Coolify.
    expose:
      - "80"

volumes:
  postgres_data:
