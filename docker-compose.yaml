services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-gour}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gour}
      POSTGRES_DB:       ${DB_NAME:-accounts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gour} -d ${DB_NAME:-accounts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go API backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:                   ${PORT:-8080}
      DB_HOST:                db               # service name above
      DB_PORT:                5432
      DB_USER:                ${DB_USER:-gour}
      DB_PASSWORD:            ${DB_PASSWORD:-gour}
      DB_NAME:                ${DB_NAME:-accounts}

      # ── Auth & JWT ────────────────────────────────────────────────
      APP_ENV:                ${APP_ENV:-production}
      JWT_SECRET:             ${JWT_SECRET:-gour-jwt-production-secret-change-me}
      JWT_ISSUER:             ${JWT_ISSUER:-accounts.gour.io}
      JWT_AUDIENCE:           ${JWT_AUDIENCE:-accounts.gour.io}
      JWT_PRIVATE_KEY:        ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY:         ${JWT_PUBLIC_KEY:-}
      JWKS_URL:               ${JWKS_URL:-}
      ACCOUNTS_BASE_URL:      ${ACCOUNTS_BASE_URL:-https://accounts.gour.io}
      APP_URL:                ${APP_URL:-https://accounts.gour.io}

      # ── CORS & Redirect allowlists ────────────────────────────────
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:4000,https://accounts.gour.io,https://warmup.gour.io,https://reach.gour.io,https://sendflow.gour.io}
      ALLOW_ORIGINS:          ${ALLOW_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:4000,https://accounts.gour.io,https://warmup.gour.io,https://reach.gour.io,https://sendflow.gour.io}
      AUTH_REDIRECT_URIS:     ${AUTH_REDIRECT_URIS:-http://localhost:4000/auth/callback,http://localhost:3000/callback,https://reach.gour.io/auth/callback,https://warmup.gour.io/callback,https://sendflow.gour.io/callback}
      ALLOWED_REDIRECT_ORIGINS: ${ALLOWED_REDIRECT_ORIGINS:-http://localhost:3000,http://localhost:4000,https://warmup.gour.io,https://reach.gour.io,https://sendflow.gour.io}

      # ── Admin ─────────────────────────────────────────────────────
      ADMIN_SECRET:           ${ADMIN_SECRET:-gour-admin-secret-change-me}
      ADMIN_EMAIL:            ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-}

      # ── Email (SMTP — ZeptoMail) ─────────────────────────────────
      SMTP_HOST:              ${SMTP_HOST:-smtp.zeptomail.in}
      SMTP_PORT:              ${SMTP_PORT:-587}
      SMTP_USER:              ${SMTP_USER:-emailapikey}
      SMTP_PASS:              ${SMTP_PASS:-}
      SMTP_FROM:              ${SMTP_FROM:-info@gridworkit.online}
      SMTP_REPLY_TO:          ${SMTP_REPLY_TO:-happy.haplu@gmail.com}

      # ── Stripe (billing) ─────────────────────────────────────────
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_EMAIL_WARMUP_PRICE_ID: ${STRIPE_EMAIL_WARMUP_PRICE_ID:-price_1T9zUvHKFrC8ZGXqp8kExIBa}
      STRIPE_REACH_PRICE_ID:  ${STRIPE_REACH_PRICE_ID:-price_1TBJyxHKFrC8ZGXq2S97y4RI}
      STRIPE_SENDFLOW_PRICE_ID: ${STRIPE_SENDFLOW_PRICE_ID:-price_1TEkorHKFrC8ZGXqotnT8Nvk}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # No external port — backend is only reachable internally via Docker network.
    # nginx (frontend) proxies /api/ → http://backend:8080 without exposing 8080.
    expose:
      - "8080"

  # ── Vue frontend (nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_FRONTEND=${SERVICE_FQDN_FRONTEND:-https://accounts.gour.io}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8080}
    labels:
      - traefik.enable=true
      - traefik.http.services.frontend.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "80"

volumes:
  postgres_data:
